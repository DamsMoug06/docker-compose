name: Build an Test application
on:
  push:
    branches:[master]
  pull_request:
    branches:[master]
  jobs:
    build_test:
    runs-on: ubuntu-latest

    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image for mongo
        run: docker build -t my-app:1.0.0 -f ./mongo/Dockerfile .
        run: docker build -t my-app:1.0.0 -f ./api/Dockerfile .

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

        
      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: my-app:1.0.0
          file: ./mongo/Dockerfile
          only-severities: critical,high
          exit-code: true

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: my-app:1.0.0
          file: ./api/Dockerfile
          only-severities: critical,high
          exit-code: true
