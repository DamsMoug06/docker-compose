name: CI Docker Scan
on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Mongo image
        run:  |
          cd mongo
          docker build -t mongo-app:1.0.0 -f ./Dockerfile .

      - name: Build API image
        run: |
          cd api
          docker build -t api-app:1.0.0 -f ./Dockerfile .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Scout Scan Mongo
        uses: docker/scout-action@v1
        with:
          command: cves
          image: mongo-app:1.0.0
          file: ./mongo/Dockerfile
          only-severities: critical,high
          exit-code: false

      - name: Docker Scout Scan API
        uses: docker/scout-action@v1
        with:
          command: cves
          image: api-app:1.0.0
          file: ./api/Dockerfile
          only-severities: critical,high
          exit-code: false
