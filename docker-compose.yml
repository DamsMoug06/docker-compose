services:
  db_mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-blog_db}
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin \"$${MONGO_INITDB_DATABASE}\" --eval 'if (db.runCommand({ ping: 1 }).ok !== 1) quit(3); if (!db.getCollectionNames().includes(\"posts\")) quit(4); if (db.posts.countDocuments() !== 5) quit(5);'"
        ]
      interval: 10s
      timeout: 6s
      retries: 10
      start_period: 40s

  db_mysql:
    image: mysql:8.0
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myapp}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./sqlfiles:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" -h 127.0.0.1 -e \"SELECT COUNT(*) = 4 AS ok FROM $${MYSQL_DATABASE}.utilisateur;\" | tail -n 1 | grep -q 1"
        ]
      interval: 10s
      timeout: 6s
      retries: 10
      start_period: 35s

  admin_mongo:
    image: mongo-express:1.0-20
    restart: on-failure
    depends_on:
      db_mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: db_mongo
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_BASIC_AUTH_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_BASIC_AUTH_PASSWORD:-admin}
    ports:
      - "${MONGO_EXPRESS_PORT:-8082}:8081"
    networks:
      - backend
      - front

  admin_mysql:
    image: adminer:4
    restart: on-failure
    depends_on:
      db_mysql:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    networks:
      - backend
      - front

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      db_mysql:
        condition: service_healthy
      db_mongo:
        condition: service_healthy
    environment:
      MYSQL_HOST: db_mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myapp}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MONGO_DB: ${MONGO_INITDB_DATABASE:-blog_db}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@db_mongo:27017/${MONGO_INITDB_DATABASE:-blog_db}?authSource=admin
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - backend
      - front
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8000/posts >/dev/null && curl -fsS http://localhost:8000/users >/dev/null"
        ]
      interval: 10s
      timeout: 6s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
  mongo_data:

networks:
  backend:
    driver: bridge
    internal: true
  front:
    driver: bridge
    